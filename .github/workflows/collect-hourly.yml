name: 버스 교통량 시간별 수집

on:
  schedule:
    - cron: '0 * * * *'  # 매 시간 정각 (UTC) = KST 매 시간+9
  workflow_dispatch:      # 수동 실행 버튼도 활성화

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 교통량 데이터 수집
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://web-five-phi-58.vercel.app/api/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP Status: $response"
          if [ "$response" != "200" ]; then
            echo "수집 실패: HTTP $response"
            exit 1
          fi
          echo "수집 완료"

      - name: 수집 결과 출력
        run: |
          curl -s "https://web-five-phi-58.vercel.app/api/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
